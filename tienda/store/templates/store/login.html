<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión · TiendaTest</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'store/css/main.css' %}">
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🛒</span>
      <h1>TiendaTest</h1>
      <p>Panel de pruebas</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-error">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username"
               placeholder="nombre de usuario" required autofocus />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Entrar
      </button>
    </form>

    <div class="auth-hint">
      <p><strong>Admin:</strong> usuario con <code>is_staff = True</code></p>
      <p><strong>Usuario:</strong> cualquier cuenta regular</p>
    </div>
  </div>

</body>
</html>
